<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolution Simulator</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* --- CSS TO MATCH MINUTELABS UI --- */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #222222;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #dddddd;
    }

    /* Top Navigation */
    #top-nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 10;
      pointer-events: none;
    }
    #top-nav h2 {
      margin: 0;
      font-weight: 400;
      color: #999;
      font-size: 22px;
    }
    #top-nav h2.active { color: #ffffff; }
    .btn-settings {
      background-color: #20b2aa;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 16px;
      pointer-events: auto;
      cursor: pointer;
      margin-top: 40px;
      position: absolute;
      left: 20px;
    }

    /* Floating Side Toolbar */
    #side-toolbar {
      position: absolute;
      right: 20px;
      top: 100px;
      background: linear-gradient(to bottom, #2a2a2a, #4a5d58);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      z-index: 10;
      pointer-events: auto;
    }
    .tool-btn {
      background: none;
      border: none;
      color: #20b2aa;
      font-size: 20px;
      padding: 15px 10px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .tool-btn:hover { color: #ffffff; }
    .tool-btn.inactive { color: #666; }

    /* Playback Controls */
    #playback {
      position: absolute;
      bottom: 160px; /* Right above the timeline */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      align-items: center;
      z-index: 10;
    }
    .play-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
    }
    .play-btn.main { font-size: 32px; color: #cca573; }

    /* Bottom Timeline */
    #timeline {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      background-color: #111111;
      border-top: 3px solid #20b2aa;
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-sizing: border-box;
      gap: 15px;
      overflow-x: hidden;
      z-index: 10;
    }
    .generation-marker {
      width: 100px;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .generation-marker.active {
      background-color: #1a2a27;
    }
    .generation-marker.active::before {
      content: '';
      position: absolute;
      top: 0;
      width: 0; 
      height: 0; 
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 20px solid #1a2a27;
      transform: translateY(-100%);
    }
    /* Mock Pie Charts using Conic Gradients */
    .pie-chart {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(#20b2aa 0% 40%, #f1c40f 40% 60%, #e74c3c 60% 75%, #ecf0f1 75% 100%);
      margin-bottom: 10px;
    }
    .gen-label {
      font-size: 14px;
      color: #ddd;
    }
    .timeline-title {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 2px;
      color: #888;
    }
  </style>
</head>
<body>

  <div id="top-nav">
    <i class="fa-solid fa-lightbulb" style="font-size: 28px; color: #ccc;"></i>
    <h2>About</h2>
    <h2 class="active">World</h2>
    <h2>Trends</h2>
  </div>
  <button class="btn-settings">settings</button>

  <div id="side-toolbar">
    <button class="tool-btn inactive"><i class="fa-solid fa-caret-up"></i></button>
    <button class="tool-btn"><i class="fa-solid fa-eye"></i></button>
    <button class="tool-btn"><i class="fa-solid fa-person-running"></i></button>
    <button class="tool-btn inactive"><i class="fa-solid fa-bolt"></i></button>
    <button class="tool-btn inactive"><i class="fa-solid fa-utensils"></i></button>
  </div>

  <div id="playback">
    <button class="play-btn"><i class="fa-solid fa-chevron-left"></i></button>
    <button class="play-btn main"><i class="fa-solid fa-play"></i></button>
    <button class="play-btn"><i class="fa-solid fa-chevron-right"></i></button>
    <button class="play-btn" style="margin-left: 20px;"><i class="fa-solid fa-forward-step"></i></button>
  </div>

  <div id="timeline">
    <div class="timeline-title">GENERATIONS</div>
  </div>

  <script>
    // --- 1. SETUP 3D SCENE ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    // Isometric-style Camera Setup
    const aspect = window.innerWidth / window.innerHeight;
    const d = 350; // View size
    const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 2000);
    
    // Position camera exactly like the screenshot (Isometric looking down)
    camera.position.set(400, 400, 400); 
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting to match the soft MinuteLabs look
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(100, 300, 200);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // --- 2. CREATE THE BOARD ---
    const BOARD_SIZE = 500;
    
    // The thick square platform
    const boardGeo = new THREE.BoxGeometry(BOARD_SIZE, 20, BOARD_SIZE);
    
    // Create materials for top (white) and sides (gray)
    const topMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
    const sideMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 1 });
    const materials = [sideMat, sideMat, topMat, sideMat, sideMat, sideMat];
    
    const board = new THREE.Mesh(boardGeo, materials);
    board.position.y = -10; // Push down so surface is at Y=0
    board.receiveShadow = true;
    scene.add(board);

    // --- 3. CREATURES AND FOOD ---
    let blobs = [];
    let foods = [];
    const FOOD_COUNT = 50;

    // Teardrop Shape: A stretched sphere
    const blobGeo = new THREE.SphereGeometry(6, 16, 16);
    // Food Shape: Small sphere
    const foodGeo = new THREE.SphereGeometry(3, 8, 8);
    const foodMat = new THREE.MeshStandardMaterial({ color: 0x689f38 }); // Green dot

    class Blob {
      constructor(x, z) {
        this.x = x;
        this.z = z;
        this.speed = Math.random() * 1.5 + 0.5;
        this.angle = Math.random() * Math.PI * 2;
        
        // Teardrop material (Dark blue-ish like screenshot)
        this.material = new THREE.MeshStandardMaterial({ color: 0x3d6889, roughness: 0.5 });
        this.mesh = new THREE.Mesh(blobGeo, this.material);
        
        // Stretch it to look like a teardrop/egg
        this.mesh.scale.set(1, 1.5, 1);
        
        this.mesh.position.set(this.x, 9, this.z);
        this.mesh.castShadow = true;
        scene.add(this.mesh);
      }

      update() {
        // Simple wandering logic to make the board look alive
        this.angle += (Math.random() - 0.5) * 0.2;
        
        this.x += Math.cos(this.angle) * this.speed;
        this.z += Math.sin(this.angle) * this.speed;

        // Keep them on the square board
        const bounds = (BOARD_SIZE / 2) - 10;
        if (this.x > bounds || this.x < -bounds || this.z > bounds || this.z < -bounds) {
          this.angle += Math.PI; // Turn around
          this.x = Math.max(-bounds, Math.min(bounds, this.x));
          this.z = Math.max(-bounds, Math.min(bounds, this.z));
        }

        this.mesh.position.x = this.x;
        this.mesh.position.z = this.z;
        
        // Tilt slightly in the direction of movement
        this.mesh.rotation.z = Math.cos(this.angle) * -0.2;
        this.mesh.rotation.x = Math.sin(this.angle) * 0.2;
      }
    }

    class Food {
      constructor(x, z) {
        this.mesh = new THREE.Mesh(foodGeo, foodMat);
        this.mesh.position.set(x, 3, z);
        this.mesh.receiveShadow = true;
        scene.add(this.mesh);
      }
    }

    function initWorld() {
      // Spawn Food
      const bounds = (BOARD_SIZE / 2) - 20;
      for (let i = 0; i < FOOD_COUNT; i++) {
        let x = (Math.random() * bounds * 2) - bounds;
        let z = (Math.random() * bounds * 2) - bounds;
        foods.push(new Food(x, z));
      }

      // Spawn Blobs
      for (let i = 0; i < 40; i++) {
        let x = (Math.random() * bounds * 2) - bounds;
        let z = (Math.random() * bounds * 2) - bounds;
        blobs.push(new Blob(x, z));
      }
      
      buildTimeline();
    }

    // --- 4. UI POPULATION ---
    function buildTimeline() {
      const timeline = document.getElementById('timeline');
      // Generate 5 fake generation markers to match the look
      for(let i = 1; i <= 5; i++) {
        let marker = document.createElement('div');
        marker.className = i === 2 ? 'generation-marker active' : 'generation-marker';
        
        let pie = document.createElement('div');
        pie.className = 'pie-chart';
        // Randomize the gradient a bit for visual variety
        let p1 = Math.floor(Math.random() * 30 + 10);
        let p2 = Math.floor(Math.random() * 30 + p1);
        pie.style.background = `conic-gradient(#20b2aa 0% ${p1}%, #f1c40f ${p1}% ${p2}%, #ecf0f1 ${p2}% 100%)`;
        
        let label = document.createElement('div');
        label.className = 'gen-label';
        label.innerText = i;
        
        marker.appendChild(pie);
        marker.appendChild(label);
        timeline.appendChild(marker);
      }
    }

    // --- 5. ANIMATION LOOP ---
    function animate() {
      requestAnimationFrame(animate);

      // Move blobs
      for (let b of blobs) {
        b.update();
      }

      renderer.render(scene, camera);
    }

    // Handle window resizing
    window.addEventListener('resize', () => {
      const aspect = window.innerWidth / window.innerHeight;
      camera.left = -d * aspect;
      camera.right = d * aspect;
      camera.top = d;
      camera.bottom = -d;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initWorld();
    animate();
  </script>
</body>
</html>
