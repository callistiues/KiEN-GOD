<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Evolution Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 15px 25px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #ui span { color: #4CAF50; font-weight: bold; }
        .stat { margin-bottom: 8px; font-size: 18px; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="ui">
        <div class="stat">Generation: <span id="gen">1</span></div>
        <div class="stat">Time Left: <span id="time">10.0</span>s</div>
        <div class="stat">Best Distance: <span id="best">0</span>m</div>
    </div>

    <script>
        // --- 1. SET UP MATTER.JS PHYSICS ---
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint,
              Events = Matter.Events;

        const engine = Engine.create();
        const world = engine.world;

        // Set up the renderer
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#1a1a1a',
                hasBounds: true // Allows camera panning
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // Create the ground (Very long rectangle)
        const ground = Bodies.rectangle(5000, window.innerHeight - 50, 15000, 100, { 
            isStatic: true,
            friction: 0.8, // High friction so creatures can grip and crawl
            render: { fillStyle: '#2ecc71' }
        });
        Composite.add(world, ground);

        // --- 2. EVOLUTION SETTINGS ---
        const POPULATION_SIZE = 25;
        const GENERATION_TIME = 600; // Frames (approx 10 seconds at 60fps)
        let generation = 1;
        let timer = GENERATION_TIME;
        let population = [];
        let globalBestX = 0;

        // --- 3. CREATURE CLASS ---
        // A creature is a triangle of 3 nodes connected by 3 "muscles" (spring constraints).
        class Creature {
            constructor(x, y, dna, isChampion = false) {
                this.isChampion = isChampion;
                
                // If no DNA is provided, create random DNA (Amplitude, Phase, Speed for 3 muscles)
                this.dna = dna || [
                    { amp: Math.random() * 30 + 10, phase: Math.random() * Math.PI * 2, speed: Math.random() * 0.1 + 0.05 },
                    { amp: Math.random() * 30 + 10, phase: Math.random() * Math.PI * 2, speed: Math.random() * 0.1 + 0.05 },
                    { amp: Math.random() * 30 + 10, phase: Math.random() * Math.PI * 2, speed: Math.random() * 0.1 + 0.05 }
                ];

                const color = isChampion ? '#ffd700' : `hsl(${Math.random()*360}, 70%, 60%)`;
                const opacity = isChampion ? 1 : 0.6; // Make normal creatures slightly see-through

                // Collision group: negative numbers mean they WON'T collide with each other, only the ground
                const group = Body.nextGroup(true); 

                // Create 3 Nodes (Heavy circles)
                this.nodes = [
                    Bodies.circle(x, y - 40, 12, { friction: 0.8, density: 0.05, collisionFilter: { group: group }, render: { fillStyle: color, opacity: opacity } }),
                    Bodies.circle(x - 30, y + 20, 12, { friction: 0.8, density: 0.05, collisionFilter: { group: group }, render: { fillStyle: color, opacity: opacity } }),
                    Bodies.circle(x + 30, y + 20, 12, { friction: 0.8, density: 0.05, collisionFilter: { group: group }, render: { fillStyle: color, opacity: opacity } })
                ];

                // Create 3 Muscles (Constraints)
                const baseLen = 70;
                this.muscles = [
                    Constraint.create({ bodyA: this.nodes[0], bodyB: this.nodes[1], length: baseLen, stiffness: 0.1, render: { strokeStyle: color, lineWidth: 4 } }),
                    Constraint.create({ bodyA: this.nodes[1], bodyB: this.nodes[2], length: baseLen, stiffness: 0.1, render: { strokeStyle: color, lineWidth: 4 } }),
                    Constraint.create({ bodyA: this.nodes[2], bodyB: this.nodes[0], length: baseLen, stiffness: 0.1, render: { strokeStyle: color, lineWidth: 4 } })
                ];

                this.composite = Composite.create();
                Composite.add(this.composite, this.nodes);
                Composite.add(this.composite, this.muscles);
                Composite.add(world, this.composite);
                
                this.time = 0;
            }

            // Flex the muscles based on DNA
            update() {
                this.time++;
                const baseLen = 70;
                for (let i = 0; i < 3; i++) {
                    const gene = this.dna[i];
                    // Sine wave math to expand and contract muscles
                    this.muscles[i].length = baseLen + gene.amp * Math.sin(this.time * gene.speed + gene.phase);
                }
            }

            // Fitness is determined by how far Right (positive X) the center of the creature moved
            getFitness() {
                let sumX = 0;
                this.nodes.forEach(n => sumX += n.position.x);
                return sumX / 3; // Average X position of the 3 nodes
            }

            destroy() {
                Composite.remove(world, this.composite);
            }
        }

        // --- 4. GENETIC ALGORITHM LOGIC ---

        function spawnPopulation() {
            population = [];
            for (let i = 0; i < POPULATION_SIZE; i++) {
                // Spawn them all at X: 200, slightly above the ground
                population.push(new Creature(200, window.innerHeight - 200)); 
            }
        }

        function mutate(dna) {
            let newDna = JSON.parse(JSON.stringify(dna)); // Deep copy
            for (let i = 0; i < 3; i++) {
                if (Math.random() < 0.3) newDna[i].amp += (Math.random() - 0.5) * 10;
                if (Math.random() < 0.3) newDna[i].phase += (Math.random() - 0.5) * 1.0;
                if (Math.random() < 0.3) newDna[i].speed += (Math.random() - 0.5) * 0.05;
                
                // Keep genes within reasonable physical limits
                newDna[i].amp = Math.max(0, Math.min(50, newDna[i].amp));
                newDna[i].speed = Math.max(0.01, Math.min(0.3, newDna[i].speed));
            }
            return newDna;
        }

        function nextGeneration() {
            // 1. Sort population by fitness (highest X distance first)
            population.sort((a, b) => b.getFitness() - a.getFitness());
            
            let bestFitness = population[0].getFitness();
            if (bestFitness > globalBestX) globalBestX = bestFitness;

            let nextGen = [];
            
            // 2. Elitism: Keep the absolute best creature exactly as it is (Color it Gold)
            nextGen.push(new Creature(200, window.innerHeight - 200, population[0].dna, true));

            // 3. Breed the rest from the top 5 performers
            const topPerformers = population.slice(0, 5);
            for (let i = 1; i < POPULATION_SIZE; i++) {
                let parent = topPerformers[Math.floor(Math.random() * topPerformers.length)];
                let childDna = mutate(parent.dna);
                nextGen.push(new Creature(200, window.innerHeight - 200, childDna));
            }

            // 4. Destroy old bodies to free up memory
            population.forEach(p => p.destroy());
            
            // 5. Reset for new day
            population = nextGen;
            generation++;
            timer = GENERATION_TIME;
            
            // Reset Camera
            Render.lookAt(render, {
                min: { x: 0, y: 0 },
                max: { x: window.innerWidth, y: window.innerHeight }
            });
            
            updateUI();
        }

        // --- 5. MAIN SIMULATION LOOP ---
        const Body = Matter.Body;

        Events.on(engine, 'beforeUpdate', function() {
            if (population.length === 0) return;

            // Update all creature muscles
            population.forEach(p => p.update());

            // Track time
            timer--;
            document.getElementById('time').innerText = (timer / 60).toFixed(1);

            // Dynamic Camera: Follow the creature that is furthest to the right
            let currentBestX = 0;
            population.forEach(p => {
                let x = p.getFitness();
                if (x > currentBestX) currentBestX = x;
            });
            
            // Smoothly pan camera
            Render.lookAt(render, {
                min: { x: currentBestX - 400, y: window.innerHeight - 600 },
                max: { x: currentBestX + window.innerWidth - 400, y: window.innerHeight }
            });

            if (timer <= 0) {
                nextGeneration();
            }
        });

        function updateUI() {
            document.getElementById('gen').innerText = generation;
            // Convert pixels to an arbitrary "meters" unit for display
            document.getElementById('best').innerText = (globalBestX / 100).toFixed(1);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        });

        // Start!
        spawnPopulation();

    </script>
</body>
</html>
