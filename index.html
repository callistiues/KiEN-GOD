<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Natural Selection Simulation</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    canvas {
      background-color: #2c3e50;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      margin-top: 15px;
    }
    .stats {
      background: #333;
      padding: 15px;
      border-radius: 8px;
      display: flex;
      gap: 20px;
      font-size: 18px;
    }
    span { font-weight: bold; color: #4CAF50; }
  </style>
</head>
<body>

  <h1>Natural Selection Simulation</h1>
  <div class="stats">
    <div>Day: <span id="gen">1</span></div>
    <div>Population: <span id="pop">0</span></div>
    <div>Avg Speed: <span id="avgSpeed">0</span></div>
  </div>

  <!-- The environment -->
  <canvas id="simCanvas" width="600" height="600"></canvas>

  <script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    let generation = 1;
    let blobs = [];
    let foods = [];
    const FOOD_COUNT = 40;
    const WORLD_RADIUS = 300;
    const CENTER = 300;
    const FOOD_SPAWN_RADIUS = 200;

    class Blob {
      constructor(x, y, speed) {
        this.x = x;
        this.y = y;
        this.homeX = x;
        this.homeY = y;
        this.speed = speed;
        // Energy pool. Faster speeds drain it exponentially quicker.
        this.energy = 250; 
        this.foodEaten = 0;
        this.state = 'foraging'; 
      }

      update() {
        if (this.state === 'done') return;

        // Energy formula: Base metabolism + Movement cost (speed^2)
        let energyCost = 0.5 + (this.speed * this.speed * 0.03);
        this.energy -= energyCost;

        if (this.energy <= 0) {
          this.state = 'done'; // Ran out of energy before getting home
          return;
        }

        if (this.state === 'foraging') {
          // Look for closest food
          let closestDist = Infinity;
          let closestFood = null;

          for (let f of foods) {
            if (!f.eaten) {
              let d = Math.hypot(this.x - f.x, this.y - f.y);
              if (d < closestDist) {
                closestDist = d;
                closestFood = f;
              }
            }
          }

          if (closestFood) {
            // Move toward food
            let angle = Math.atan2(closestFood.y - this.y, closestFood.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;

            // Eat the food if close enough
            if (closestDist < 6) {
              closestFood.eaten = true;
              this.foodEaten++;
              // If they secured 2 pieces, they're full and go home
              if (this.foodEaten >= 2) this.state = 'returning';
            }
          } else {
            // No food left, must retreat home
            this.state = 'returning';
          }
        } else if (this.state === 'returning') {
          // Head back to home edges
          let d = Math.hypot(this.x - this.homeX, this.y - this.homeY);
          if (d <= this.speed) {
            this.x = this.homeX;
            this.y = this.homeY;
            this.state = 'done'; // Safe at home!
          } else {
            let angle = Math.atan2(this.homeY - this.y, this.homeX - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
          }
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
        // Fast = Red, Slow = Blue
        let hue = Math.max(0, 240 - (this.speed * 30)); 
        ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
        ctx.fill();
      }
    }

    class Food {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.eaten = false;
      }
      draw() {
        if (this.eaten) return;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#2ecc71'; // Green food
        ctx.fill();
      }
    }

    function spawnDay() {
      // Spawn Food in the middle area
      foods = [];
      for (let i = 0; i < FOOD_COUNT; i++) {
        let angle = Math.random() * Math.PI * 2;
        let r = Math.random() * FOOD_SPAWN_RADIUS;
        foods.push(new Food(CENTER + Math.cos(angle) * r, CENTER + Math.sin(angle) * r));
      }

      // First Generation Initialization
      if (generation === 1) {
        for (let i = 0; i < 20; i++) {
          let angle = (i / 20) * Math.PI * 2;
          blobs.push(new Blob(CENTER + Math.cos(angle) * WORLD_RADIUS, CENTER + Math.sin(angle) * WORLD_RADIUS, 2)); // Initial speed: 2
        }
      }
    }

    function endDay() {
      let nextGenBlobs = [];

      for (let b of blobs) {
        let distToHome = Math.hypot(b.x - b.homeX, b.y - b.homeY);
        let safelyHome = (distToHome < 10); // Check if they successfully made it back to the edge

        if (safelyHome) {
          let angle1 = Math.random() * Math.PI * 2;
          
          if (b.foodEaten >= 1) {
             // 1 Food = Survive (Copied over to next day)
             nextGenBlobs.push(new Blob(CENTER + Math.cos(angle1) * WORLD_RADIUS, CENTER + Math.sin(angle1) * WORLD_RADIUS, b.speed));
          }
          if (b.foodEaten >= 2) {
             // 2 Foods = Reproduce (Creates an offspring with a mutated speed trait)
             let angle2 = Math.random() * Math.PI * 2;
             let mutation = (Math.random() - 0.5) * 1.5; // Randomly alter speed
             let newSpeed = Math.max(0.5, b.speed + mutation); // Don't allow negative speeds
             nextGenBlobs.push(new Blob(CENTER + Math.cos(angle2) * WORLD_RADIUS, CENTER + Math.sin(angle2) * WORLD_RADIUS, newSpeed));
          }
        }
      }

      blobs = nextGenBlobs;
      generation++;
      spawnDay();
      updateUI();

      // If population dies out, reset
      if (blobs.length === 0) {
          alert("Extinction! Restarting simulation.");
          generation = 1;
          spawnDay();
          updateUI();
      }
    }

    function updateUI() {
      document.getElementById('gen').innerText = generation;
      document.getElementById('pop').innerText = blobs.length;
      let avg = blobs.reduce((sum, b) => sum + b.speed, 0) / (blobs.length || 1);
      document.getElementById('avgSpeed').innerText = avg.toFixed(2);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw safe home boundary
      ctx.beginPath();
      ctx.arc(CENTER, CENTER, WORLD_RADIUS - 5, 0, Math.PI * 2);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 10;
      ctx.stroke();

      foods.forEach(f => f.draw());

      let activeBlobs = false;
      for (let b of blobs) {
        b.update();
        b.draw();
        if (b.state !== 'done') activeBlobs = true; // Wait until all blobs are dead or safely home
      }

      if (!activeBlobs) {
        setTimeout(endDay, 500); // 0.5s pause between generations to process the results
      } else {
        requestAnimationFrame(animate);
      }
    }

    // Start Simulation
    spawnDay();
    updateUI();
    animate();
  </script>
</body>
</html>
